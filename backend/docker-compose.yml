# docket compose - for local development setup
# note the ports/other settings and adjust as required

services:
    # postgres
    db:
        image: postgres:15
        container_name: my_postgres_db
        restart: always
        environment:
            POSTGRES_USER: user1
            POSTGRES_PASSWORD: 12345
            POSTGRES_DB: db1
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    # redis
    redis:
        image: redis:7-alpine
        container_name: my_redis
        restart: always
        ports:
            - '6379:6379'
        # password to match Fastify plugin config
        command: redis-server --requirepass 12345
        volumes:
            - redis_data:/data

    # redis GUI
    redis-commander:
        image: rediscommander/redis-commander:latest
        container_name: redis-commander
        restart: always
        environment:
            - REDIS_HOSTS=local:redis:6379:0:12345 # host:port:db:password
        ports:
            - '8081:8081'
        depends_on:
            - redis

# shared volumes
volumes:
    postgres_data:
    redis_data:
