name: CI Test Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        services:

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Start Services (Postgres & Redis)
              run: docker-compose up -d db redis

            - name: Install dependencies
              run: npm ci

            - name: Build Application
              run: npm run build

            - name: Run Tests

              run: npm run run:files ./dist/tests/ .test.js
              env:
                  DATABASE_URL: postgresql://user1:12345@localhost:5432/db1
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
                  REDIS_PASSWORD: 12345

            - name: Shutdown Services
              if: always()
              run: docker-compose down
