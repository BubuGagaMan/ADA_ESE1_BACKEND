name: CI Test Pipeline

on:
    pull_request:
        branches: ['**']

    push:
        branches: [main, dev]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        working-directory: ./backend

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  # Pointing to your lock file inside /backend
                  cache-dependency-path: ./backend/package-lock.json

            - name: Start Databases (Postgres & Redis)
              # Updated to 'docker compose' (no hyphen)
              # Added sleep to prevent "Connection Refused" errors
              run: |
                  docker compose up -d db redis
                  sleep 10

            - name: Install dependencies
              run: npm ci

            - name: Build Application
              run: npm run build

            - name: Run Tests

              run: npm run run:files ./dist/tests/ .test.js
              env:
                  DATABASE_URL: postgresql://user1:12345@localhost:5432/db1
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
                  REDIS_PASSWORD: 12345

            - name: Shutdown Services
              if: always()
              run: docker compose down
